<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Список продуктів</title>
    <style>
        h3 {
            text-align: center;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: lightgray;
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
        }

        .wrapper {
            font-family: "Montserrat", sans-serif;
            font-weight: 100;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-direction: row;
            margin: 10px 10px;
            padding:10px;
        }

        .card {
            background-color: lightgray;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-direction: column-reverse;
            text-align: center;
            border: 0.5px solid gray;
            border-radius: 20px;
        }

        .card img {
            width: 80%;
        }

        .position {
            text-align: center;
        }

        div {
            display: flex;
            align-items: flex-start;
            flex-direction: row;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<p>
<h3>What do I have in my fridge?</h3>
</p>
<div class="wrapper">
    <div class="card">
        <p>Pepper</p>
        <img src="https://cdn-icons-png.flaticon.com/128/12717/12717151.png" alt="Pepper">
    </div>
    <div class="card">
        <p>Apple</p>
        <img src="https://cdn-icons-png.flaticon.com/128/1791/1791305.png" alt="Apple">
    </div>
    <div class="card">
        <p>Cheese</p>
        <img src="https://cdn-icons-png.flaticon.com/128/819/819827.png" alt="Cheese">
    </div>
    <div class="card">
        <p>Corn</p>
        <img src="https://cdn-icons-png.flaticon.com/128/9432/9432700.png" alt="Corn">
    </div>
    <div class="card">
        <p>Mushroom</p>
        <img src="https://cdn-icons-png.flaticon.com/128/11942/11942690.png" alt="Mushroom">
    </div>
    <div class="monstrerrat-<uniquifier>">
        <div class="card">
            <p>Garlic</p>
            <img src="https://cdn-icons-png.flaticon.com/128/15618/15618172.png" alt="Garlic">
        </div>
        <div class="card">
            <p>Beef</p>
            <img src="https://cdn-icons-png.flaticon.com/128/821/821070.png" alt="Beef">
        </div>
        <div class="card">
            <p>Fish</p>
            <img src="https://cdn-icons-png.flaticon.com/128/4516/4516004.png" alt="Fish">
        </div>
        <div class="card">
            <p>Eggs</p>
            <img src="https://cdn-icons-png.flaticon.com/128/1046/1046825.png" alt="Eggs">
        </div>
        <div class="card">
            <p>Coriander</p>
            <img src="https://cdn-icons-png.flaticon.com/128/8765/8765634.png" alt="Coriander">
        </div>
    </div>
</div>
<p class="position">...that's all...</p>
</body>
</html>
